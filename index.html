<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ras Martinez Portfolio</title>

<link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

<style>

/* ===== EMERALD THEME ===== */
:root {
  --emerald: #10b981;
  --emerald-dark: #065f46;
  --emerald-light: #d1fae5;
}

/* Global */
body {
  font-family: 'Segoe UI', sans-serif;
}

/* Navbar */
#header {
  transition: 0.3s;
}
#header.scrolled {
  background: rgba(6,95,70,0.95);
  backdrop-filter: blur(8px);
}

/* Hero */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(6,95,70,0.7), rgba(16,185,129,0.6)),
              url('assets/img/Img4.png') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

/* Buttons */
.button-a {
  background: var(--emerald);
  border: none;
}
.button-a:hover {
  background: var(--emerald-dark);
}

/* Cards */
.card {
  transition: all 0.3s ease;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 15px 30px rgba(16,185,129,0.2);
}

/* Images */
.custom-img {
  height: 220px;
  object-fit: cover;
  transition: 0.4s;
}
.card:hover .custom-img {
  transform: scale(1.05);
}

/* Fade-in animation */
.fade-in {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
}
.fade-in.appear {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header id="header" class="fixed-top">
  <div class="container d-flex justify-content-between">
    <h3 class="text-white">Ras Martinez</h3>
    <nav>
      <a href="#hero" class="text-white mx-2">Home</a>
      <a href="#blog" class="text-white mx-2">Work</a>
      <a href="#contact" class="text-white mx-2">Contact</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section id="hero" class="hero">
  <div>
    <h1>Ras Martinez — Interactive Designer</h1>
    <p>Designer • Developer • Creator</p>
  </div>
</section>

<!-- BLOG / CARDS -->
<section id="blog" class="py-5">
  <div class="container">

    <div class="text-center mb-5 fade-in">
      <h2>My Work</h2>
    </div>

    <div class="row g-4">

      <!-- Card 1 -->
      <div class="col-md-4 fade-in">
        <div class="card h-100 shadow-sm">

          <div class="overflow-hidden">
            <img src="https://raw.githubusercontent.com/RasMartinez8/RasMartinez/main/assets/img/MC%20Tunes%20screenshot.png" 
                 class="img-fluid custom-img">
          </div>

          <div class="card-body">
            <h5>MC Tunes Project</h5>
            <p>Interactive prototype built in Figma.</p>
          </div>

        </div>
      </div>

      <!-- Card 2 -->
      <div class="col-md-4 fade-in">
        <div class="card h-100 shadow-sm">
          <div class="overflow-hidden">
            <img src="assets/img/Designers-pointing-at-screen-620x414.jpg" class="img-fluid custom-img">
          </div>
          <div class="card-body">
            <h5>Design Ideas</h5>
            <p>Creative interaction concepts.</p>
          </div>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="col-md-4 fade-in">
        <div class="card h-100 shadow-sm">
          <div class="overflow-hidden">
            <img src="assets/img/post-3.jpg" class="img-fluid custom-img">
          </div>
          <div class="card-body">
            <h5>More Work</h5>
            <p>Exploring design systems and UX.</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="py-5 text-center">
  <h2>Contact Me</h2>
  <p>Email: rasjuly2000@gmail.com</p>
</section>

<!-- SCRIPTS -->
<script>
/* Navbar scroll effect */
window.addEventListener("scroll", function() {
  document.getElementById("header")
    .classList.toggle("scrolled", window.scrollY > 50);
});

/* Fade-in animation */
const faders = document.querySelectorAll(".fade-in");
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("appear");
    }
  });
});

faders.forEach(el => observer.observe(el));
</script>

</body>
</html>
